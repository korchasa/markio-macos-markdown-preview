       as document metadata, not an author-written code block. The hljs theme
       already themes the background per light/dark; the border is a scheme-
       neutral translucent grey. The border + caption live on a wrapper, not on
       the <pre>, because highlight.js gives the <pre> `overflow:auto`, which
       would clip a caption poking above its top edge. [REF:fr:frontmatter] */

      position: relative;
      margin-top: 1.6em;

      content: "frontmatter";

      top: -0.72em;

      color: rgba(128, 128, 128, 0.9);

      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;

  <article id="content" class="markdown-body"></article>
  <script>
    "use strict";

    var __dark = window.matchMedia &&
      window.matchMedia('(prefers-color-scheme: dark)').matches;

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Attribute-context escape: escapeHtml plus quotes, so a fence info string
    // can never break out of a data-* attribute. [REF:fr:code-copy]
    function escapeAttr(s) {
      return escapeHtml(s).replace(/"/g, '&quot;');
    }

    // [REF:fr:inline-html] — allowlist gate between md.render() and the DOM.
    // Runs BEFORE innerHTML assignment: inserting first and cleaning after
    // would already fire `<img onerror>`. Profiles keep raw HTML (tables with
    // rowspan/colspan, details, kbd, …) and KaTeX MathML; DOMPurify defaults
    // strip script/event handlers/javascript: URLs; FORBID_TAGS blocks
    // document-wide CSS injection via <style>. A missing DOMPurify global is
    // a build defect — fail fast, never insert unsanitized content.
    function sanitizeHtml(html) {
      if (!window.DOMPurify) throw new Error('DOMPurify asset missing');
      return window.DOMPurify.sanitize(html, {
        USE_PROFILES: { html: true, mathMl: true },
        FORBID_TAGS: ['style']
      });
    }

    // Render one LaTeX fragment to KaTeX HTML. Best-effort: throwOnError:false
    // makes malformed math render an error node instead of throwing (NFR
    // Reliability); trust:false plus the sanitizeHtml() gate block HTML injection.
    // [REF:fr:math]
    function renderMath(tex, displayMode) {
      if (!window.katex) return escapeHtml(tex);
      try {
        return window.katex.renderToString(tex, {
          throwOnError: false, trust: false, displayMode: displayMode
        });
      } catch (e) {
        console.warn('katex render failed', e);
        return escapeHtml(tex);
      }

    // markdown-it math plugin: inline `$…$` and block `$$…$$` are tokenized at
    // PARSE time (before emphasis/backslash rules), so `*`, `_`, `\` inside a
    // formula are never mangled and `$` inside a code span never reaches the
    // rule. Standard markdown-it-katex delimiter logic; `isValidDelim`'s
    // no-digit-after-close guard keeps `$5 and $10` literal. [REF:fr:math]
    function mathPlugin(md) {
      function isValidDelim(state, pos) {
        var max = state.posMax,
            canOpen = true,
            canClose = true;
        var prevChar = pos > 0 ? state.src.charCodeAt(pos - 1) : -1;
        var nextChar = pos + 1 <= max ? state.src.charCodeAt(pos + 1) : -1;
        // Closing `$` cannot follow whitespace or precede a digit (money guard).
        if (prevChar === 0x20 || prevChar === 0x09 ||
            (nextChar >= 0x30 && nextChar <= 0x39)) {
          canClose = false;
        }
        // Opening `$` cannot precede whitespace.
        if (nextChar === 0x20 || nextChar === 0x09) {
          canOpen = false;
        }
        return { canOpen: canOpen, canClose: canClose };
      }

      function mathInline(state, silent) {
        if (state.src[state.pos] !== '$') return false;
        var res = isValidDelim(state, state.pos);
        if (!res.canOpen) {
          if (!silent) state.pending += '$';
          state.pos += 1;
          return true;
        }
        // Skip past any escaped `\$` delimiters when seeking the closing `$`.
        var start = state.pos + 1;
        var match = start;
        var pos;
        while ((match = state.src.indexOf('$', match)) !== -1) {
          pos = match - 1;
          while (state.src[pos] === '\\') pos -= 1;
          if ((match - pos) % 2 === 1) break;
          match += 1;
        }
        if (match === -1) {
          if (!silent) state.pending += '$';
          state.pos = start;
          return true;
        }
        if (match - start === 0) {
          if (!silent) state.pending += '$$';
          state.pos = start + 1;
          return true;
        }
        res = isValidDelim(state, match);
        if (!res.canClose) {
          if (!silent) state.pending += '$';
          state.pos = start;
          return true;
        }
        if (!silent) {
          var token = state.push('math_inline', 'math', 0);
          token.markup = '$';
          token.content = state.src.slice(start, match);
        }
        state.pos = match + 1;
        return true;
      }

      function mathBlock(state, start, end, silent) {
        var firstLine, lastLine, next, lastPos, found = false, token,
            pos = state.bMarks[start] + state.tShift[start],
            max = state.eMarks[start];
        if (pos + 2 > max) return false;
        if (state.src.slice(pos, pos + 2) !== '$$') return false;
        pos += 2;
        firstLine = state.src.slice(pos, max);
        if (silent) return true;
        if (firstLine.trim().slice(-2) === '$$') {
          firstLine = firstLine.trim().slice(0, -2);
          found = true;
        }
        for (next = start; !found;) {
          next++;
          if (next >= end) break;
          pos = state.bMarks[next] + state.tShift[next];
          max = state.eMarks[next];
          if (pos < max && state.tShift[next] < state.blkIndent) break;
          if (state.src.slice(pos, max).trim().slice(-2) === '$$') {
            lastPos = state.src.slice(0, max).lastIndexOf('$$');
            lastLine = state.src.slice(pos, lastPos);
            found = true;
          }
        }
        state.line = next + 1;
        token = state.push('math_block', 'math', 0);
        token.block = true;
        token.content = (firstLine && firstLine.trim() ? firstLine + '\n' : '') +
          state.getLines(start + 1, next, state.tShift[start], true) +
          (lastLine && lastLine.trim() ? lastLine : '');
        token.map = [start, state.line];
        token.markup = '$$';
        return true;
      }

      md.inline.ruler.after('escape', 'math_inline', mathInline);
      md.block.ruler.after('blockquote', 'math_block', mathBlock, {
        alt: ['paragraph', 'reference', 'blockquote', 'list']
      });
      md.renderer.rules.math_inline = function (tokens, idx) {
        return renderMath(tokens[idx].content, false);
      };
      md.renderer.rules.math_block = function (tokens, idx) {
        return renderMath(tokens[idx].content, true) + '\n';
      };
    }

    // markdown-it frontmatter plugin: a YAML block fenced by `---` at the VERY
    // top of the document is tokenized before the `hr`/`lheading` rules (which
    // otherwise mangle it into a setext heading + rule) and rendered as a
    // highlighted YAML box. Document-start-only: a `---` block anywhere else is
    // left to the normal thematic-break / setext handling. [REF:fr:frontmatter]
    function frontMatterPlugin(md) {
      var DASH = 0x2D;  // '-'

      // True when the line is nothing but `-` characters (>= min), no indent.
      function isFence(state, line) {
        if (state.tShift[line] !== 0) return false;
        var start = state.bMarks[line] + state.tShift[line];
        var max = state.eMarks[line];
        if (max - start < 3) return false;
        for (var pos = start; pos < max; pos++) {
          if (state.src.charCodeAt(pos) !== DASH) return false;
        }
        return true;
      }

      function frontMatter(state, startLine, endLine, silent) {
        // Only at the very start of the document, at the outermost indent.
        if (startLine !== 0 || state.blkIndent !== 0) return false;
        if (!isFence(state, startLine)) return false;
        // Seek the closing fence.
        var closeLine = startLine, found = false;
        for (;;) {
          closeLine++;
          if (closeLine >= endLine) break;
          if (isFence(state, closeLine)) { found = true; break; }
        }
        if (!found) return false;   // no closing fence → not frontmatter
        if (silent) return true;
        var token = state.push('front_matter', '', 0);
        token.markup = '---';
        token.content = state.getLines(startLine + 1, closeLine, 0, false);
        token.map = [startLine, closeLine + 1];
        state.line = closeLine + 1;
        return true;
      }

      md.block.ruler.before('table', 'front_matter', frontMatter, {
        alt: ['paragraph', 'reference', 'blockquote', 'list']
      });
      md.renderer.rules.front_matter = function (tokens, idx) {
        var yaml = tokens[idx].content;
        var body;
        if (window.hljs && window.hljs.getLanguage('yaml')) {
          try {
            body = window.hljs.highlight(yaml, { language: 'yaml', ignoreIllegals: true }).value;
          } catch (e) {
            console.warn('frontmatter highlight failed', e);
            body = escapeHtml(yaml);
          }
        } else {
          body = escapeHtml(yaml);
        }
        return '<div class="markio-frontmatter-box"><pre class="hljs markio-frontmatter">' +
          '<code>' + body + '</code></pre></div>\n';
      };
    }

    // ---- ANSI SGR rendering ------------------------------------------------
    // Hand-rolled renderer for the SGR subset agent logs actually use — no
    // vendored library. Supported (documented in SDS §3.6): reset 0; bold 1,
    // dim 2, italic 3, underline 4, strikethrough 9; off codes 22/23/24/29;
    // fg 30–37/90–97 + default 39; bg 40–47/100–107 + default 49; 256-color
    // 38;5;n / 48;5;n; truecolor 38;2;r;g;b / 48;2;r;g;b. Everything else —
    // inverse, blink, cursor movement, erase, OSC titles/hyperlinks — is
    // stripped, never displayed raw. Total by construction: a malformed
    // sequence consumes just its own bytes and the scan continues (NFR
    // Reliability). Named colors 0–15 map to palette classes so they follow
    // light/dark; 256-cube/grayscale and truecolor emit inline styles (they
    // survive the DOMPurify gate, which allows the style attribute by
    // default). [REF:fr:ai-artifacts]
    var ANSI_RE = new RegExp(
      '\\u001b(?:' +
        '\\[([0-9;:?]*)[ -/]*([@-~])' +          // CSI: params, final byte
        '|\\][^\\u0007\\u001b]*(?:\\u0007|\\u001b\\\\)?' +  // OSC: BEL/ST-terminated
        '|[@-Z\\\\-_]' +                          // Fe escapes (single char)
        '|.?' +                                   // anything else: drop ESC (+1)
      ')', 'g');

    function ansiHex(r, g, b) {
      function h(x) {
        x = Math.max(0, Math.min(255, Math.round(x)));
        return (x < 16 ? '0' : '') + x.toString(16);
      }
      return '#' + h(r) + h(g) + h(b);
    }

    // 256-color index → palette class index (0–15) or inline hex (16–255).
    function ansiColor256(n) {
      if (isNaN(n) || n < 0 || n > 255) return null;
      if (n < 16) return { index: n };
      if (n >= 232) {
        var v = 8 + (n - 232) * 10;
        return { css: ansiHex(v, v, v) };
      }
      var idx = n - 16;
      var lv = [0, 95, 135, 175, 215, 255];
      return {
        css: ansiHex(
          lv[Math.floor(idx / 36)], lv[Math.floor(idx / 6) % 6], lv[idx % 6])
      };
    }

    function renderAnsi(src) {
      var out = '';
      var st = { bold: false, dim: false, italic: false, underline: false,
                 strike: false, fg: null, bg: null };

      function emit(text) {
        if (!text) return;
        var classes = [];
        var styles = [];
        if (st.bold) classes.push('ansi-bold');
        if (st.dim) classes.push('ansi-dim');
        if (st.italic) classes.push('ansi-italic');
        if (st.underline) classes.push('ansi-underline');
        if (st.strike) classes.push('ansi-strike');
        if (st.fg) {
          if (st.fg.index != null) classes.push('ansi-fg-' + st.fg.index);
          else styles.push('color:' + st.fg.css);
        }
        if (st.bg) {
          if (st.bg.index != null) classes.push('ansi-bg-' + st.bg.index);
          else styles.push('background-color:' + st.bg.css);
        }
        if (!classes.length && !styles.length) { out += escapeHtml(text); return; }
        out += '<span' +
          (classes.length ? ' class="' + classes.join(' ') + '"' : '') +
          (styles.length ? ' style="' + styles.join(';') + '"' : '') + '>' +
          escapeHtml(text) + '</span>';
      }

      // One SGR parameter list, e.g. "1;38;5;196". Empty params mean 0.
      function applySGR(params) {
        var p = params.split(';');
        for (var i = 0; i < p.length; i++) {
          var n = p[i] === '' ? 0 : parseInt(p[i], 10);
          if (isNaN(n)) continue;
          if (n === 0) {
            st = { bold: false, dim: false, italic: false, underline: false,
                   strike: false, fg: null, bg: null };
          } else if (n === 1) { st.bold = true; }
          else if (n === 2) { st.dim = true; }
          else if (n === 3) { st.italic = true; }
          else if (n === 4) { st.underline = true; }
          else if (n === 9) { st.strike = true; }
          else if (n === 22) { st.bold = false; st.dim = false; }
          else if (n === 23) { st.italic = false; }
          else if (n === 24) { st.underline = false; }
          else if (n === 29) { st.strike = false; }
          else if (n >= 30 && n <= 37) { st.fg = { index: n - 30 }; }
          else if (n >= 90 && n <= 97) { st.fg = { index: n - 82 }; }
          else if (n === 39) { st.fg = null; }
          else if (n >= 40 && n <= 47) { st.bg = { index: n - 40 }; }
          else if (n >= 100 && n <= 107) { st.bg = { index: n - 92 }; }
          else if (n === 49) { st.bg = null; }
          else if (n === 38 || n === 48) {
            // Extended color: 38;5;<idx> or 38;2;<r>;<g>;<b> (same for 48).
            var target = n === 38 ? 'fg' : 'bg';
            var mode = parseInt(p[i + 1], 10);
            if (mode === 5) {
              var c = ansiColor256(parseInt(p[i + 2], 10));
              if (c) st[target] = c;
              i += 2;
            } else if (mode === 2) {
              var r = parseInt(p[i + 2], 10), g = parseInt(p[i + 3], 10),
                  b = parseInt(p[i + 4], 10);
              if (!isNaN(r) && !isNaN(g) && !isNaN(b)) {
                st[target] = { css: ansiHex(r, g, b) };
              }
              i += 4;
            }
            // Unknown mode: skip just the 38/48 itself.
          }
          // Any other parameter (inverse 7, blink 5, …): ignored.
        }
      }

      var last = 0;
      var m;
      ANSI_RE.lastIndex = 0;
      while ((m = ANSI_RE.exec(src)) !== null) {
        emit(src.slice(last, m.index));
        last = ANSI_RE.lastIndex;
        // Only a well-formed SGR (CSI final byte `m`, numeric params) changes
        // state; every other escape sequence is stripped silently.
        if (m[2] === 'm' && /^[0-9;]*$/.test(m[1] || '')) {
          applySGR(m[1] || '');
        }
      }
      emit(src.slice(last));
      return out;
    }

    var md = window.markdownit({
      html: true,         // raw HTML passes through; sanitizeHtml() gates it
                          // before DOM insertion. [REF:fr:inline-html]
      linkify: true,      // GFM autolinks
      typographer: false,
      highlight: function (str, lang) {
        if (lang === 'mermaid') {
          return '<pre class="mermaid">' + escapeHtml(str) + '</pre>';

        // can show a badge. DOMPurify keeps data-* attributes (ALLOW_DATA_ATTR
        // default), so the attribute survives the sanitize gate. [REF:fr:code-copy]
        var langAttr = lang ? ' data-lang="' + escapeAttr(lang) + '"' : '';
        // A fence carrying ANSI escapes is a terminal artifact, not source
        // code: render SGR colors instead of syntax highlight, regardless of
        // the language tag (agent logs are pasted untagged or mis-tagged; a
        // tagged fence with ESC bytes trades language highlighting for color
        // rendering — the trade-off is recorded in SDS §3.6).
        // [REF:fr:ai-artifacts]
        if (str.indexOf('\u001b[') !== -1) {
          return '<pre class="hljs markio-ansi"' + langAttr + '><code>' +
            renderAnsi(str) + '</code></pre>';

              window.hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +

          } catch (e) { console.warn('highlight failed for language ' + lang, e); }
        }
        return '<pre class="hljs"' + langAttr + '><code>' + escapeHtml(str) + '</code></pre>';

      .use(mathPlugin).use(frontMatterPlugin);

    function initMermaid() {
      if (!window.mermaid) return;
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'strict',
        theme: __dark ? 'dark' : 'default'
      });
    }
    initMermaid();

    // Render Markdown into the page. Returns true when DOM + diagrams are ready.
    // Mermaid is async; awaiting it lets native/tests observe a settled DOM.
    async function render(markdown) {
      // Preserve the reader's scroll position across the re-render (live
      // reload / appearance switch). While Mermaid SVGs are momentarily
      // replaced by their short source text the document shrinks and WebKit
      // clamps the window scroll — restore it once the page has settled. The
      // browser re-clamps if the new document is genuinely shorter, and a
      // fresh page restores to 0 (no-op). [REF:fr:live-reload]
      var scrollX = window.scrollX, scrollY = window.scrollY;
      var el = document.getElementById('content');
      el.innerHTML = sanitizeHtml(md.render(markdown != null ? String(markdown) : ''));
      rebuildTOC();
      decorateCodeBlocks();
      // A re-render (live reload, appearance switch) invalidates the overlay's
      // cloned diagram — close it. [REF:fr:mermaid-zoom]
      closeZoom();
      if (window.mermaid) {
        var nodes = el.querySelectorAll('pre.mermaid');
        if (nodes.length) {
          // Keep the fence source: mermaid.run replaces it with the SVG, and
          // the PNG copy path re-renders from source. [REF:fr:mermaid-zoom]
          for (var mi = 0; mi < nodes.length; mi++) {
            nodes[mi].dataset.markioSrc = nodes[mi].textContent;
          }
          // Malformed diagram: leave the source text in place, never throw, but
          // surface the cause for debugging in the Web Inspector.
          try { await window.mermaid.run({ nodes: nodes }); }
          catch (e) { console.warn('mermaid.run failed', e); }
          decorateMermaid();
        }
      }
      window.scrollTo(scrollX, scrollY);
      postCurrentSection();
      return true;
    }

    // ---- Copy button on code blocks -----------------------------------------
    // The page owns the hover UI (button + badge); the clipboard write is
    // native: a click posts the raw code text to the one-way `markioCopy`
    // message handler and PreviewController writes NSPasteboard (in-page
    // navigator.clipboard is unreliable in the sandboxed WKWebView).
    // Decoration is re-created on every render — no state to preserve across
    // live reloads. Fenced blocks only: mermaid (`pre.mermaid`) and the
    // frontmatter box (`pre.markio-frontmatter`) are excluded. [REF:fr:code-copy]
    function decorateCodeBlocks() {
      var root = document.getElementById('content');
      var pres = root.querySelectorAll('pre.hljs:not(.markio-frontmatter)');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        var wrap = document.createElement('div');
        wrap.className = 'markio-codeblock';
        pre.parentNode.replaceChild(wrap, pre);
        wrap.appendChild(pre);
        var ui = document.createElement('div');
        ui.className = 'markio-code-ui';
        var lang = pre.getAttribute('data-lang');
        if (lang) {
          var badge = document.createElement('span');
          badge.className = 'markio-code-lang';
          badge.textContent = lang;
          ui.appendChild(badge);
        }
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'markio-copy';
        btn.textContent = 'Copy';
        ui.appendChild(btn);
        wrap.appendChild(ui);
      }
    }

    // One delegated listener (#content survives re-renders, buttons do not):
    // post the block's raw code — the <code> textContent is markup-free by
    // construction — and flash optimistic "Copied" feedback. The handler guard
    // keeps the page working headless. [REF:fr:code-copy]
    document.getElementById('content').addEventListener('click', function (e) {
      var btn = e.target && e.target.closest ?
        e.target.closest('button.markio-copy') : null;
      if (!btn) return;
      var wrap = btn.closest('.markio-codeblock');
      var code = wrap ? wrap.querySelector('pre.hljs > code') : null;
      if (!code) return;
      if (window.webkit && window.webkit.messageHandlers &&
          window.webkit.messageHandlers.markioCopy) {
        window.webkit.messageHandlers.markioCopy.postMessage(code.textContent);
      }
      btn.textContent = 'Copied';
      setTimeout(function () { btn.textContent = 'Copy'; }, 1500);
    });

    // ---- Mermaid zoom & copy -------------------------------------------------
    // Click a rendered diagram → in-page lightbox with pan/zoom (wide
    // flowcharts are unreadable at column width). "Copy PNG" re-renders the
    // diagram source off-screen with SVG-text labels (htmlLabels: false via a
    // per-render init directive): WebKit does not paint foreignObject content
    // when an SVG is drawn to a canvas, so rasterizing the displayed SVG would
    // yield blank labels. The base64 PNG goes native over the one-way
    // markioCopyImage handler (NSPasteboard write; in-page navigator.clipboard
    // is unreliable in the sandboxed WKWebView), guarded so headless/Quick Look
    // contexts no-op. The hover UI reuses .markio-code-ui so the find walker
    // skips it; the overlay lives outside #content, invisible to find.
    // [REF:fr:mermaid-zoom]
    function decorateMermaid() {
      var root = document.getElementById('content');
      var pres = root.querySelectorAll('pre.mermaid');
      for (var i = 0; i < pres.length; i++) {
        var pre = pres[i];
        if (!pre.querySelector('svg')) continue; // malformed: source left as text
        var wrap = document.createElement('div');
        wrap.className = 'markio-mermaid';
        pre.parentNode.replaceChild(wrap, pre);
        wrap.appendChild(pre);
        var ui = document.createElement('div');
        ui.className = 'markio-code-ui';
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'markio-mermaid-copy';
        btn.textContent = 'Copy PNG';
        ui.appendChild(btn);
        wrap.appendChild(ui);
      }
    }

    function flashCopyPNGButton(btn, label) {
      if (!btn) return;
      btn.textContent = label;
      setTimeout(function () { btn.textContent = 'Copy PNG'; }, 1500);
    }

    var __rasterSeq = 0;

    // Off-screen re-render with SVG-text labels: swap the global config to
    // htmlLabels:false for one render, then restore via initMermaid() (the
    // same initialize path the theme switch uses), so the on-screen config
    // (htmlLabels on → wrapping labels) is untouched. An `%%{init}%%`
    // directive was tried first but did not disable htmlLabels in the
    // vendored mermaid 11.6.
    async function markioRasterSVG(src) {
      window.mermaid.initialize({
        startOnLoad: false,
        securityLevel: 'strict',
        theme: __dark ? 'dark' : 'default',
        htmlLabels: false,
        flowchart: { htmlLabels: false },
        class: { htmlLabels: false },
        state: { htmlLabels: false }
      });
      try {
        var out = await window.mermaid.render(
          'markio-raster-' + (++__rasterSeq), String(src || ''));
        return out.svg;
      } finally {
        initMermaid();
      }
    }

    // SVG string → PNG base64 (no data-URL prefix). 2× scale for Retina, the
    // longest side clamped to 8192 px. The canvas is filled with the page
    // background so pasted PNGs stay readable on any surface.
    async function rasterizeMermaidPNG(svgText) {
      var doc = new DOMParser().parseFromString(svgText, 'image/svg+xml');
      var svg = doc.documentElement;
      if (svg.nodeName.toLowerCase() !== 'svg') throw new Error('not an SVG');
      var vb = svg.viewBox && svg.viewBox.baseVal;
      var w = (vb && vb.width) || parseFloat(svg.getAttribute('width')) || 800;
      var h = (vb && vb.height) || parseFloat(svg.getAttribute('height')) || 600;
      var scale = Math.min(2, 8192 / Math.max(w, h));
      svg.setAttribute('width', w);
      svg.setAttribute('height', h);
      svg.style.maxWidth = '';
      var url = 'data:image/svg+xml;charset=utf-8,' +
        encodeURIComponent(new XMLSerializer().serializeToString(svg));
      var img = new Image();
      await new Promise(function (resolve, reject) {
        img.onload = resolve;
        img.onerror = function () { reject(new Error('SVG image decode failed')); };
        img.src = url;
      });
      var canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(w * scale));
      canvas.height = Math.max(1, Math.round(h * scale));
      var ctx = canvas.getContext('2d');
      ctx.fillStyle = getComputedStyle(document.body).backgroundColor || '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      return canvas.toDataURL('image/png').split(',')[1];
    }

    async function copyMermaidPNG(src, btn) {
      try {
        if (!window.mermaid) throw new Error('mermaid unavailable');
        var png = await rasterizeMermaidPNG(await markioRasterSVG(src));
        if (window.webkit && window.webkit.messageHandlers &&
            window.webkit.messageHandlers.markioCopyImage) {
          window.webkit.messageHandlers.markioCopyImage.postMessage(png);
        }
        flashCopyPNGButton(btn, 'Copied');
      } catch (e) {
        console.warn('mermaid PNG copy failed', e);
        flashCopyPNGButton(btn, 'Failed');
      }
    }

    var __zoom = null;
    var __zoomState = { scale: 1, tx: 0, ty: 0, src: '' };

    function applyZoomTransform() {
      var canvas = __zoom.querySelector('.markio-zoom-canvas');
      canvas.style.transform = 'translate(' + __zoomState.tx + 'px, ' +
        __zoomState.ty + 'px) scale(' + __zoomState.scale + ')';

      canvas.dataset.tx = String(__zoomState.tx);
      canvas.dataset.ty = String(__zoomState.ty);
    }

    // Scale clamped to 0.1…16; when a focal point is given the point under the
    // cursor stays fixed while scaling.
    function setZoomScale(next, cx, cy) {
      next = Math.min(16, Math.max(0.1, next));
      if (cx != null) {
        var k = next / __zoomState.scale;
        __zoomState.tx = cx - (cx - __zoomState.tx) * k;
        __zoomState.ty = cy - (cy - __zoomState.ty) * k;

      __zoomState.scale = next;
      applyZoomTransform();

      stage.className = 'markio-zoom-stage';
      var canvas = document.createElement('div');
      canvas.className = 'markio-zoom-canvas';
      stage.appendChild(canvas);
      overlay.appendChild(stage);
      var controls = document.createElement('div');
      controls.className = 'markio-zoom-controls';

      var zoomIn = mk('markio-zoom-in', '+', 'Zoom in');

      var close = mk('markio-zoom-close', '✕', 'Close');

      document.body.appendChild(overlay);

          stage.clientWidth / 2, stage.clientHeight / 2);

      zoomOut.addEventListener('click', function () {

      var lastDragMoved = false;

      });

        var dx = e.clientX - drag.x;
        var dy = e.clientY - drag.y;

        drag.x = e.clientX;
        drag.y = e.clientY;

        __zoomState.tx += dx;
        __zoomState.ty += dy;

      stage.addEventListener('pointerup', function () {
        if (drag) { lastDragMoved = drag.moved; }
        drag = null;
      });
      stage.addEventListener('pointercancel', function () { drag = null; });
      stage.addEventListener('click', function (e) {
        if (lastDragMoved) { lastDragMoved = false; return; }
        if (e.target && e.target.closest && e.target.closest('svg')) return;
        closeZoom();
      });

      window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && !overlay.hidden) closeZoom();
      });
      __zoom = overlay;
      return overlay;
    }

    // Fit the diagram to ~90% of the stage (up- or downscale, capped at 4×)
    // and center it. The fit is applied to the SVG's LAYOUT size, not the
    // transform: a vector re-laid-out at the target size stays crisp, while
    // an upscaling CSS transform rasterizes the layer and blurs. The
    // transform stays identity here — wheel/buttons zoom on top of the
    // fitted base. Shared by open and the ⟲ button.
    function fitZoom() {
      var stage = __zoom.querySelector('.markio-zoom-stage');
      var canvas = __zoom.querySelector('.markio-zoom-canvas');
      var svg = canvas.querySelector('svg');
      __zoomState.scale = 1;
      __zoomState.tx = 0;
      __zoomState.ty = 0;
      applyZoomTransform();
      // A zero-sized stage (headless/offscreen host with no layout) has
      // nothing to fit to — keep the identity transform.
      if (!stage.clientWidth || !stage.clientHeight || !svg) return;
      svg.style.width = '';
      svg.style.height = '';
      var rect = svg.getBoundingClientRect(); // transform is identity here
      var pad = 48 * 2; // canvas padding, unscaled
      var f = Math.min(
        4,
        (stage.clientWidth * 0.9 - pad) / Math.max(1, rect.width),
        (stage.clientHeight * 0.9 - pad) / Math.max(1, rect.height));
      if (f > 0 && isFinite(f)) {
        svg.style.width = rect.width * f + 'px';
        svg.style.height = rect.height * f + 'px';
      }
      __zoomState.tx = Math.max(0, (stage.clientWidth - canvas.offsetWidth) / 2);
      __zoomState.ty = Math.max(0, (stage.clientHeight - canvas.offsetHeight) / 2);
      applyZoomTransform();
    }

    function openZoom(pre) {
      var svg = pre.querySelector('svg');
      if (!svg) return;
      var overlay = buildZoom();
      var canvas = overlay.querySelector('.markio-zoom-canvas');
      canvas.innerHTML = '';
      var clone = svg.cloneNode(true);
      // The in-column render caps the SVG (max-width: 100%); show natural size.
      clone.style.maxWidth = 'none';
      canvas.appendChild(clone);
      __zoomState = { scale: 1, tx: 0, ty: 0, src: pre.dataset.markioSrc || '' };
      // Measure after unhiding: a [hidden] subtree has zero layout boxes.
      overlay.hidden = false;
      fitZoom();
    }

    function closeZoom() {
      if (__zoom) { __zoom.hidden = true; }
    }

    // Hover "Copy PNG" click + diagram click-to-zoom, delegated (#content
    // survives re-renders, decorations do not).
    document.getElementById('content').addEventListener('click', function (e) {
      var btn = e.target && e.target.closest ?
        e.target.closest('button.markio-mermaid-copy') : null;
      if (btn && btn.closest('.markio-mermaid')) {
        var owner = btn.closest('.markio-mermaid').querySelector('pre.mermaid');
        if (owner) copyMermaidPNG(owner.dataset.markioSrc || '', btn);
        return;
      }
      var pre = e.target && e.target.closest ?
        e.target.closest('.markio-mermaid pre.mermaid') : null;
      if (pre) openZoom(pre);
    });

    // ---- Local link navigation ----------------------------------------------
    // The page owns click interception only; resolution and opening are
    // native. `#anchor` scrolls in place (TOC slug ids, `scrollToHeading` is
    // hoisted). A scheme'd or protocol-relative href is left to the
    // navigation delegate (http/https → default browser, the rest blocked).
    // Any other relative href is prevented; if it targets a Markdown file its
    // RAW value is posted to the one-way `markioLink` handler (guarded for
    // headless), otherwise the click stays dead — default-deny.
    // [REF:fr:local-links]
    document.getElementById('content').addEventListener('click', function (e) {
      var a = e.target && e.target.closest ? e.target.closest('a[href]') : null;
      if (!a) return;
      var href = a.getAttribute('href') || '';
      if (href.charAt(0) === '#') {
        e.preventDefault();
        var id = href.slice(1);
        try { id = decodeURIComponent(id); } catch (err) { /* keep raw */ }
        scrollToHeading(id);
        return;
      }
      if (/^[a-zA-Z][a-zA-Z0-9+.-]*:/.test(href) || href.slice(0, 2) === '//') return;
      e.preventDefault();
      if (!/\.(md|markdown)$/i.test(href.split('#')[0])) return;
      if (window.webkit && window.webkit.messageHandlers &&
          window.webkit.messageHandlers.markioLink) {
        window.webkit.messageHandlers.markioLink.postMessage(href);
      }
    });

    // ---- Table of contents --------------------------------------------------
    // The native sidebar owns the chrome; the page owns the content mechanics:
    // heading ids, outline extraction, jump scrolling, and the current-section
    // math. Heading elements are re-created on every render, so the cache is
    // rebuilt in render() — stale nodes never leak across a live reload.
    // [REF:fr:toc]
    var __toc = { headings: [], lastPosted: '' };

    // GitHub-style slug: lowercase, punctuation stripped (unicode letters and
    // digits kept), whitespace collapsed to dashes.
    function slugify(text) {
      return text.trim().toLowerCase()
        .replace(/[^\p{L}\p{N}\s_-]/gu, '')
        .replace(/\s+/g, '-');
    }

    // Walk #content h1–h6 in document order: assign deduplicated slug ids
    // (`beta`, `beta-1`, …) and cache the outline. Headings whose trimmed text
    // is empty still get ids but are excluded from the outline — they carry no
    // navigational meaning.
    function rebuildTOC() {
      var root = document.getElementById('content');
      var els = root.querySelectorAll('h1,h2,h3,h4,h5,h6');
      var used = Object.create(null);
      var items = [];
      for (var i = 0; i < els.length; i++) {
        var heading = els[i];
        var text = (heading.textContent || '').trim();
        var base = slugify(text) || 'section';
        var id = base;
        var n = 1;
        while (used[id]) { id = base + '-' + (n++); }
        used[id] = true;
        heading.id = id;
        if (text) {
          items.push({
            level: Number(heading.tagName[1]), text: text, id: id, el: heading
          });
        }
      }
      __toc.headings = items;
    }

    function getOutline() {
      return __toc.headings.map(function (h) {
        return { level: h.level, text: h.text, id: h.id };
      });
    }

    // The current section is the last heading at/above a small viewport-top
    // threshold; before any heading crosses it the first heading is current.
    // Empty string when the document has no headings.
    function computeCurrentSection() {
      var hs = __toc.headings;
      if (!hs.length) return '';
      var current = hs[0].id;
      for (var i = 0; i < hs.length; i++) {
        if (hs[i].el.getBoundingClientRect().top <= 12) current = hs[i].id;
        else break;
      }
      return current;
    }

    function getCurrentSection() { return computeCurrentSection(); }

    // Push the current section id to native when (and only when) it changes —
    // rapid scrolling produces at most one message per section boundary. The
    // handler guard keeps the page working headless (tests drive it via
    // evaluate, where no messageHandlers bridge exists).
    function postCurrentSection() {
      var id = computeCurrentSection();
      if (id === __toc.lastPosted) return;
      __toc.lastPosted = id;
      if (window.webkit && window.webkit.messageHandlers &&
          window.webkit.messageHandlers.markioTOC) {
        window.webkit.messageHandlers.markioTOC.postMessage(id);
      }
    }

    // Synchronous on purpose: rAF does not fire in offscreen web views (tests),
    // and the cached heading list keeps the recompute O(headings).
    window.addEventListener('scroll', postCurrentSection);

    // ---- Scroll position persistence ----------------------------------------
    // The page reports the reading position to native, which persists it per
    // document and pushes it back on the next open (relaunch / Open Recent /
    // reopen). True debounce: the page-global timer resets on every scroll
    // event and fires 250 ms after the last one — continuous saving survives
    // even a force quit. The handler guard keeps the page working headless.
    // [REF:fr:session-restore]
    var __scrollPost = { timer: null, lastPosted: -1 };
    function postScrollPosition() {
      if (__scrollPost.timer) clearTimeout(__scrollPost.timer);
      __scrollPost.timer = setTimeout(function () {
        __scrollPost.timer = null;
        var y = Math.round(window.scrollY);
        if (y === __scrollPost.lastPosted) return;
        __scrollPost.lastPosted = y;
        if (window.webkit && window.webkit.messageHandlers &&
            window.webkit.messageHandlers.markioScroll) {
          window.webkit.messageHandlers.markioScroll.postMessage(String(y));
        }
      }, 250);
    }
    window.addEventListener('scroll', postScrollPosition);

    // Restore entrypoint: the browser clamps a position beyond the (possibly
    // shorter) document, so the applied value is returned for verification.
    function setScrollY(y) {
      window.scrollTo(window.scrollX, Number(y) || 0);
      return window.scrollY;
    }
    function getScrollY() { return window.scrollY; }

    // ---- Compare sync (live scroll mirroring) -------------------------------
    // While a compare pair is active, the page reports the scroll position as
    // a FRACTION of its own scrollable height on every scroll event (no
    // debounce — this channel drives live mirroring; the debounced
    // `markioScroll` persistence channel above is untouched). Applying a
    // mirrored position sets a one-shot suppression flag so the resulting
    // scroll event is consumed instead of echoed back — the peer never
    // re-drives the source. [REF:fr:compare]
    var __compare = { enabled: false, suppressOnce: false };
    function setCompareSync(enabled) {
      __compare.enabled = !!enabled;
      if (!__compare.enabled) __compare.suppressOnce = false;
      return __compare.enabled;
    }
    function scrollableHeight() {
      return Math.max(0, document.documentElement.scrollHeight - window.innerHeight);
    }
    function getScrollFraction() {
      var max = scrollableHeight();
      if (max <= 0) return 0;
      return Math.min(1, Math.max(0, window.scrollY / max));
    }
    function setScrollFraction(f) {
      var frac = Math.min(1, Math.max(0, Number(f) || 0));
      var target = Math.round(frac * scrollableHeight());
      // Only arm the suppression when a scroll event WILL fire — a no-move
      // apply would leave the flag lingering and swallow the next genuine
      // user scroll.
      if (Math.abs(target - window.scrollY) > 1) {
        __compare.suppressOnce = true;
        window.scrollTo(window.scrollX, target);
      }
      return getScrollFraction();
    }
    function postCompareScroll() {
      if (!__compare.enabled) return;
      if (__compare.suppressOnce) { __compare.suppressOnce = false; return; }
      if (window.webkit && window.webkit.messageHandlers &&
          window.webkit.messageHandlers.markioSyncScroll) {
        window.webkit.messageHandlers.markioSyncScroll.postMessage(String(getScrollFraction()));
      }
    }
    // Synchronous like the other scroll listeners: rAF does not fire in
    // offscreen web views.
    window.addEventListener('scroll', postCompareScroll);

    // Jump so the heading sits at the viewport top (TOC semantics; find keeps
    // its block:'center'). Returns whether the id existed.
    function scrollToHeading(id) {
      var heading = document.getElementById(String(id));
      if (!heading) return false;
      heading.scrollIntoView({ block: 'start', inline: 'nearest' });
      postCurrentSection();
      return true;
    }

    // Width is an absolute character count: the `ch` unit = advance width of
    // the '0' glyph, so the reading column is N characters wide regardless of
    // window size. [REF:fr:line-width]
    function setContentWidth(chars) {
      document.documentElement.style.setProperty('--content-width', String(chars) + 'ch');
      return getContentWidth();
    }

    function getContentWidth() {
      return document.documentElement.style.getPropertyValue('--content-width').trim();
    }

    // Native pushes appearance changes here so Mermaid diagrams re-theme.
    async function setDark(dark) {
      __dark = !!dark;
      initMermaid();
      var current = document.getElementById('content').innerHTML;
      // Re-render only matters for Mermaid; cheap no-op otherwise handled by caller.
      return current.length;
    }

    // ---- Find in document -------------------------------------------------
    // Native find bar drives these; highlighting lives here (the web view owns
    // content rendering). __find.matches holds LOGICAL matches: each is an
    // array of <mark> segments (a match crossing element boundaries — e.g.
    // syntax-highlight token spans — is split into one <mark> per text-node
    // segment). The current match is emphasized and scrolled into view; an
    // overview strip at the right edge shows one tick per match. [REF:fr:find]
    var __find = { matches: [], index: -1 };

    // Remove every find <mark>, splicing its text back into the parent so the
    // DOM (and textContent) is restored exactly.
    function clearSearch() {
      var marks = document.querySelectorAll('mark.markio-find');
      for (var i = 0; i < marks.length; i++) {
        var m = marks[i];
        var parent = m.parentNode;
        if (!parent) continue;
        parent.replaceChild(document.createTextNode(m.textContent), m);
        parent.normalize();
      }
      removeMinimap();
      __find = { matches: [], index: -1 };
      return { count: 0, current: 0 };
    }

    // Collect the visible text nodes under #content, skipping script/style and
    // anything inside a Mermaid SVG so diagrams are never mangled.
    function collectTextNodes(root) {
      var nodes = [];
      var walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode: function (node) {
          if (!node.nodeValue || !node.nodeValue.length) return NodeFilter.FILTER_REJECT;
          var p = node.parentNode;
          while (p && p !== root) {
            var tag = p.nodeName ? p.nodeName.toLowerCase() : '';
            if (tag === 'script' || tag === 'style' || tag === 'svg') {
              return NodeFilter.FILTER_REJECT;
            }
            // Skip KaTeX-rendered math: splicing <mark> into its spans/MathML
            // would corrupt the layout. [REF:fr:math]
            if (p.classList && p.classList.contains('katex')) {
              return NodeFilter.FILTER_REJECT;
            }
            // Skip the copy button / language badge: page UI, not document
            // content — "Copy" must never be a search match. [REF:fr:code-copy]
            if (p.classList && p.classList.contains('markio-code-ui')) {
              return NodeFilter.FILTER_REJECT;
            }
            p = p.parentNode;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      });
      var n;
      while ((n = walker.nextNode())) nodes.push(n);
      return nodes;
    }

    // Tags that establish a block boundary for matching: text flowing from one
    // of these into a sibling never forms a single match (paragraph→paragraph,
    // cell→cell). Inline elements (em, strong, code spans, hljs tokens) do NOT
    // break a match — that is the point of the two-phase search.
    var BLOCK_TAGS = {
      p: 1, div: 1, li: 1, td: 1, th: 1, pre: 1, blockquote: 1, caption: 1,
      h1: 1, h2: 1, h3: 1, h4: 1, h5: 1, h6: 1, dt: 1, dd: 1, summary: 1,
      figcaption: 1
    };

    function blockAncestor(node, root) {
      var p = node.parentNode;
      while (p && p !== root) {
        if (p.nodeName && BLOCK_TAGS[p.nodeName.toLowerCase()]) return p;
        p = p.parentNode;
      }
      return root;
    }

    // Case-insensitive live search, two-phase so a match may cross element
    // boundaries (syntax-highlight token spans, inline formatting):
    // 1) concatenate the visible text nodes into one haystack with an
    //    offset→node map, separating different blocks with NUL (U+0000) (a query
    //    can never contain NUL, so no match spans a block boundary);
    // 2) locate occurrences, then wrap them from the LAST to the FIRST —
    //    splitText only trims the tail of a mapped node, so earlier offsets
    //    in the map stay valid. Each occurrence becomes one logical match of
    //    1+ <mark> segments. Returns { count, current } (1-based, 0 = none).
    function search(query) {
      clearSearch();
      query = query != null ? String(query) : '';
      if (!query) return { count: 0, current: 0 };
      var needle = query.toLowerCase();
      var root = document.getElementById('content');
      var textNodes = collectTextNodes(root);
      var hay = '';
      var map = [];
      var prevBlock = null;
      for (var i = 0; i < textNodes.length; i++) {
        var block = blockAncestor(textNodes[i], root);
        if (prevBlock !== null && block !== prevBlock) hay += '\u0000';
        map.push({ node: textNodes[i], start: hay.length, len: textNodes[i].nodeValue.length });
        hay += textNodes[i].nodeValue;
        prevBlock = block;
      }
      hay = hay.toLowerCase();
      var starts = [];
      var at = hay.indexOf(needle);
      while (at !== -1) {
        starts.push(at);
        at = hay.indexOf(needle, at + needle.length);
      }
      var groups = [];
      for (var m = starts.length - 1; m >= 0; m--) {
        groups.push(wrapMatch(map, starts[m], starts[m] + needle.length));
      }
      groups.reverse();
      __find.matches = groups;
      buildMinimap();
      if (groups.length) setCurrent(0);
      return { count: groups.length, current: groups.length ? 1 : 0 };
    }

    // Wrap haystack range [start, end) in <mark> segments, last node first (so
    // this match's own splits never invalidate its remaining segment offsets).
    // Returns the segments in document order.
    function wrapMatch(map, start, end) {
      var segs = [];
      for (var i = map.length - 1; i >= 0; i--) {
        var entry = map[i];
        if (entry.start >= end) continue;
        if (entry.start + entry.len <= start) break;
        var s = Math.max(start, entry.start) - entry.start;
        var t = Math.min(end, entry.start + entry.len) - entry.start;
        if (t <= s) continue;
        var node = entry.node;
        if (!node.parentNode) continue;
        if (t < node.nodeValue.length) node.splitText(t);
        var mid = s > 0 ? node.splitText(s) : node;
        var mark = document.createElement('mark');
        mark.className = 'markio-find';
        mid.parentNode.replaceChild(mark, mid);
        mark.appendChild(mid);
        segs.push(mark);
      }
      segs.reverse();
      return segs;
    }

    function setCurrent(i) {
      var k;
      var prev = __find.matches[__find.index];
      if (prev) {
        for (k = 0; k < prev.length; k++) prev[k].classList.remove('markio-find-current');
      }
      __find.index = i;
      var cur = __find.matches[i];
      if (cur && cur.length) {
        for (k = 0; k < cur.length; k++) cur[k].classList.add('markio-find-current');
        if (cur[0].scrollIntoView) cur[0].scrollIntoView({ block: 'center', inline: 'nearest' });
      }
      updateMinimapCurrent();
    }

    // ---- Find overview strip (minimap) --------------------------------------
    // Lives on <body> (outside #content) so render()'s innerHTML swap never
    // orphans it; rebuilt by every search(), removed by clearSearch().
    function removeMinimap() {
      var strip = document.getElementById('markio-find-minimap');
      if (strip && strip.parentNode) strip.parentNode.removeChild(strip);
    }

    function buildMinimap() {
      removeMinimap();
      if (!__find.matches.length) return;
      var strip = document.createElement('div');
      strip.id = 'markio-find-minimap';
      for (var i = 0; i < __find.matches.length; i++) {
        var tick = document.createElement('div');
        tick.className = 'markio-find-tick';
        strip.appendChild(tick);
      }
      document.body.appendChild(strip);
      layoutMinimap();
    }

    // Tick position = the match's document-absolute Y over the full document
    // height. Recomputed on window resize (both terms change on reflow).
    function layoutMinimap() {
      var strip = document.getElementById('markio-find-minimap');
      if (!strip) return;
      var docHeight = document.documentElement.scrollHeight;
      var ticks = strip.children;
      for (var i = 0; i < __find.matches.length && i < ticks.length; i++) {
        var first = __find.matches[i][0];
        if (!first) continue;
        var pageY = first.getBoundingClientRect().top + window.scrollY;
        var pct = docHeight > 0 ? (pageY / docHeight) * 100 : 0;
        ticks[i].style.top = Math.max(0, Math.min(100, pct)) + '%';
      }
    }

    function updateMinimapCurrent() {
      var strip = document.getElementById('markio-find-minimap');
      if (!strip) return;
      for (var i = 0; i < strip.children.length; i++) {
        strip.children[i].classList.toggle('markio-find-tick-current', i === __find.index);
      }
    }

    window.addEventListener('resize', layoutMinimap);

    function findNext() {
      var total = __find.matches.length;
      if (!total) return { count: 0, current: 0 };
      setCurrent((__find.index + 1) % total);
      return { count: total, current: __find.index + 1 };
    }

    function findPrev() {
      var total = __find.matches.length;
      if (!total) return { count: 0, current: 0 };
      setCurrent((__find.index - 1 + total) % total);
      return { count: total, current: __find.index + 1 };
    }

    window.render = render;
    window.setContentWidth = setContentWidth;
    window.getContentWidth = getContentWidth;
    window.setDark = setDark;
    window.search = search;
    window.findNext = findNext;
    window.findPrev = findPrev;
    window.clearSearch = clearSearch;
    window.getOutline = getOutline;
    window.getCurrentSection = getCurrentSection;
    window.scrollToHeading = scrollToHeading;
    window.setScrollY = setScrollY;
    window.getScrollY = getScrollY;
    window.setCompareSync = setCompareSync;
    window.setScrollFraction = setScrollFraction;
    window.getScrollFraction = getScrollFraction;
  </script>
</body>
</html>
